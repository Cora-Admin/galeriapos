# Nginx-Konfiguration für pos.everstore.consulting
# Auf der EC2 ablegen unter: /etc/nginx/sites-available/pos-cockpit
# Aktivieren mit:
#   sudo ln -s /etc/nginx/sites-available/pos-cockpit /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name pos.everstore.consulting;

    root /var/www/pos-cockpit;
    index index.html;

    # SPA-Routing: alle unbekannten Pfade auf index.html,
    # damit Reloads auf Unterseiten (z. B. /stores/...) nicht 404 liefern.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Statische Assets aggressiv cachen (Dateinamen sind gehasht).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# TLS:
# Da die Domain über Cloudflare läuft, übernimmt Cloudflare die HTTPS-
# Terminierung am Edge. Für End-to-End-Verschlüsselung (empfohlen) den
# Cloudflare-SSL-Modus auf "Full (strict)" stellen und auf der EC2 ein
# Zertifikat einrichten – z. B. ein Cloudflare Origin Certificate oder
# certbot (sudo certbot --nginx -d pos.everstore.consulting).
